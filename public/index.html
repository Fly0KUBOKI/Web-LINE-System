<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE Webhook ダッシュボード</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    }

    .card h2 {
      color: #667eea;
      margin-bottom: 15px;
      font-size: 1.3em;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .stat:last-child {
      border-bottom: none;
    }

    .stat-label {
      color: #666;
      font-weight: 500;
    }

    .stat-value {
      color: #667eea;
      font-size: 1.3em;
      font-weight: bold;
    }

    .status {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9em;
    }

    .status.online {
      background: #10b981;
      color: white;
    }

    .status.offline {
      background: #ef4444;
      color: white;
    }

    .messages-container {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 30px;
    }

    .messages-container h2 {
      color: #667eea;
      margin-bottom: 20px;
    }

    .message-item {
      background: #f9fafb;
      border-left: 4px solid #667eea;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 4px;
    }

    .message-item.sent {
      border-left-color: #10b981;
      background: #f0fdf4;
    }

    .message-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.85em;
      color: #666;
    }

    .message-text {
      color: #333;
      font-weight: 500;
    }

    .message-empty {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .refresh-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s ease;
    }

    .refresh-btn:hover {
      background: #764ba2;
    }

    .error {
      background: #fee;
      color: #c00;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .success {
      background: #efe;
      color: #0a0;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8em;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📱 LINE Webhook ダッシュボード</h1>
      <p>Vercel 本番環境で稼働中</p>
    </header>

    <div id="status-message"></div>

    <div class="grid">
      <div class="card">
        <h2>📊 ステータス</h2>
        <div class="stat">
          <span class="stat-label">Webhook ステータス</span>
          <span class="status online" id="webhook-status">オンライン</span>
        </div>
        <div class="stat">
          <span class="stat-label">最終更新</span>
          <span class="stat-value" id="last-update">-</span>
        </div>
      </div>

      <div class="card">
        <h2>📈 統計情報</h2>
        <div class="stat">
          <span class="stat-label">総メッセージ数</span>
          <span class="stat-value" id="total-messages">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">ユーザー数</span>
          <span class="stat-value" id="unique-users">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">総文字数</span>
          <span class="stat-value" id="total-length">0</span>
        </div>
      </div>

      <div class="card">
        <h2>⚙️ 設定</h2>
        <div class="stat">
          <span class="stat-label">Webhook URL</span>
        </div>
        <p style="font-size: 0.85em; color: #666; margin-top: 10px; word-break: break-all;">
          https://web-line-system.vercel.app/api/webhook
        </p>
        <button class="refresh-btn" onclick="refreshStats()" style="margin-top: 15px; width: 100%;">
          🔄 統計更新
        </button>
      </div>
    </div>

    <div class="messages-container">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>💬 メッセージ履歴</h2>
        <select id="message-filter" onchange="filterMessages()" style="padding: 8px 12px; border-radius: 5px; border: 1px solid #ddd;">
          <option value="all">すべて</option>
          <option value="received">受信のみ</option>
          <option value="sent">送信のみ</option>
        </select>
      </div>
      <div id="messages-list" class="message-empty">メッセージが表示されます...</div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    async function fetchStats() {
      try {
        const url = `${API_BASE}/api/stats`;
        console.log('Fetching from:', url);

        const response = await fetch(url);

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        console.log('Data received:', data);

        updateUI(data);
        showStatus('✅ 更新成功', 'success');
      } catch (error) {
        console.error('Error fetching stats:', error);
        showStatus('⚠️ データ取得エラー: ' + error.message, 'error');
        document.getElementById('webhook-status').textContent = 'オフライン';
        document.getElementById('webhook-status').className = 'status offline';
      }
    }

    function updateUI(data) {
      // 統計情報を更新
      document.getElementById('total-messages').textContent = data.totalMessages || 0;
      document.getElementById('unique-users').textContent = data.uniqueUsers || 0;
      document.getElementById('total-length').textContent = data.totalLength || 0;

      // 最終更新時刻
      const now = new Date();
      document.getElementById('last-update').textContent =
        `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

      // Webhook ステータスをオンラインに
      document.getElementById('webhook-status').textContent = 'オンライン';
      document.getElementById('webhook-status').className = 'status online';

      // メッセージ一覧を更新
      updateMessagesList(data.userStats || []);
    }

    function updateMessagesList(userStats) {
      const messagesList = document.getElementById('messages-list');

      if (!userStats || userStats.length === 0) {
        messagesList.innerHTML = '<div class="message-empty">📭 まだメッセージがありません</div>';
        return;
      }

      let html = '';
      userStats.forEach(user => {
        if (user.messages && user.messages.length > 0) {
          user.messages.forEach(msg => {
            const isReceived = msg.type === 'received';
            const time = new Date(msg.timestamp).toLocaleTimeString('ja-JP');
            html += `
              <div class="message-item ${isReceived ? '' : 'sent'}">
                <div class="message-meta">
                  <span>${isReceived ? '📥 受信' : '📤 送信'}</span>
                  <span>${time}</span>
                </div>
                <div class="message-text">${escapeHtml(msg.text)}</div>
                <div style="font-size: 0.8em; color: #999; margin-top: 5px;">
                  ユーザーID: ${user.userId.substring(0, 20)}...
                </div>
              </div>
            `;
          });
        }
      });

      messagesList.innerHTML = html;
    }

    function filterMessages() {
      const filter = document.getElementById('message-filter').value;
      const items = document.querySelectorAll('.message-item');

      items.forEach(item => {
        if (filter === 'all') {
          item.style.display = 'block';
        } else if (filter === 'received' && !item.classList.contains('sent')) {
          item.style.display = 'block';
        } else if (filter === 'sent' && item.classList.contains('sent')) {
          item.style.display = 'block';
        } else {
          item.style.display = 'none';
        }
      });
    }

    function showStatus(message, type) {
      const statusDiv = document.getElementById('status-message');
      statusDiv.innerHTML = `<div class="${type}">${message}</div>`;
      setTimeout(() => {
        statusDiv.innerHTML = '';
      }, 5000);
    }

    function refreshStats() {
      document.querySelector('.refresh-btn').disabled = true;
      document.querySelector('.refresh-btn').textContent = '🔄 更新中...';

      fetchStats().then(() => {
        document.querySelector('.refresh-btn').disabled = false;
        document.querySelector('.refresh-btn').textContent = '🔄 統計更新';
      });
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // ページロード時に統計を取得
    window.addEventListener('load', () => {
      fetchStats();
    });

    // 30秒ごとに自動更新
    setInterval(fetchStats, 30000);
  </script>
</body>
</html>
